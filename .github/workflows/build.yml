name: Build paper PDF

on:
  push:
    paths: ["paper/**", ".github/workflows/build.yml"]
  pull_request:
    paths: ["paper/**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: paper
          root_file: express_db_access.tex
          latexmk_use_xelatex: false
      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: express_db_access-pdf
          path: paper/_build/express_db_access.pdf
          if-no-files-found: error
